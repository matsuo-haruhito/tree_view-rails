  - reset_configuration!
  - parse_selection_params
  - node_key
  - model_name_for
  - attribute_name_for
  - type_name_for
configuration_options:
  tree_view_configure:
    - initial_state
    - render_log_level
public_constants:
  - Error
  - ConfigurationError
  - InvalidTreeError
  - DuplicateNodeKeyError
  - CycleDetectedError
  - InvalidRenderWindowError
  - Configuration
  - LocalizedNames
  - Tree
  - RenderState
  - ResourceTableRenderState
  - VisibleRows
  - RenderWindow
  - FilteredTree
  - UiConfig
  - UiConfigBuilder
  - GraphAdapter
  - NodePresenter
  - PathTree
  - PathTreeBuilder
  - ReverseTree
  - PersistedState
  - StateStore
  - Diagnostics
node_presenter_builder_names:
  - key
  - label
  - href
  - tooltip
  - row_class
  - row_data
  - icon
  - badge
  - actions
graph_adapter_initializer:
  required_keywords:
    - roots
    - children_resolver
  optional_keywords:
    - node_key_resolver
ui_config_builder_option_keys:
  build:
    - show_descendants_path_builder
    - hide_descendants_path_builder
    - toggle_all_path_builder
    - load_children_path_builder
    - turbo_frame
    - indent_unit
    - scope_format
  build_turbo:
    - show_descendants_path_builder
    - hide_descendants_path_builder
    - toggle_all_path_builder
    - load_children_path_builder
    - turbo_frame
    - indent_unit
    - scope_format
  build_static:
    - indent_unit
  build_client_side:
    - indent_unit
path_tree_builder_node_shapes:
  folder_node:
    constant: PathTreeBuilder::FolderNode
    fields:
      - key
      - parent_key
      - label
      - path
      - node_type
    predicates:
      - folder_node?
      - record_node?
  record_node:
    constant: PathTreeBuilder::RecordNode
    fields:
      - key
      - parent_key
      - label
      - path
      - record
      - node_type
    predicates:
      - folder_node?
      - record_node?
helper_methods:
  - tree_view_rows
  - tree_view_window
  - tree_node_dom_id
  - tree_children_container_dom_id
  - tree_remote_state_placeholder_dom_id
  - tree_remote_state_placeholder_attributes
  - tree_selection_value
  - tree_view_breadcrumb
  - tree_view_toolbar
  - tree_view_toolbar_supported_actions
  - tree_view_toolbar_actions
  - tree_view_toolbar_action_metadata
helper_option_keys:
  tree_view_rows:
    - mode
    - collapsed
    - window
  tree_view_window:
    - offset
    - limit
  tree_view_breadcrumb:
    - label_builder
    - path_builder
    - separator
    - nav_class
    - list_class
    - item_class
    - link_class
    - current_class
    - separator_class
    - aria_label
    - html
    - list_html
    - item_html
    - link_html
    - current_html
    - separator_html
  tree_view_toolbar:
    - actions
    - labels
    - class_name
    - button_class_name
    - html
    - action_html
render_window_metadata:
  - rows
  - offset
  - limit
  - total_count
  - before_count
  - after_count
  - start_index
  - end_index
  - previous?
  - next?
  - previous_offset
  - next_offset
  - empty?
toolbar_actions:
  expand_all: expanded
  collapse_all: collapsed
  collapse_all_except_current_path: current_path
toolbar_action_metadata:
  keys:
    - action
    - state
    - label
    - path
    - disabled
    - data
  data_keys:
    - tree_view_toolbar_action
    - tree_view_toolbar_disabled
setup_generators:
  persisted_state_install:
    name: tree_view:state:install
    class_name: TreeView::Generators::State::InstallGenerator
    optional_arguments:
      - name: owner_model_name
        banner: OWNER_MODEL
    generated_paths:
      - db/migrate/*_create_tree_view_states.rb
      - app/models/tree_view_state.rb
      - app/models/concerns/tree_view_state_owner.rb
grouped_option_keys:
  initial_expansion:
    - default
    - max_depth
    - expanded_keys
    - collapsed_keys
    - current_item
    - current_key
    - auto_expand_ancestors
  render_scope:
    - max_depth
    - max_leaf_distance
  toggle_scope:
    - max_depth_from_root
    - max_leaf_distance
  toggle_icons:
    - by_state
    - by_depth
    - by_type
  selection:
    - enabled
    - visibility
    - payload_builder
    - checkbox_name
    - disabled_builder
    - disabled_reason_builder
    - selected_keys
    - cascade
    - indeterminate
    - max_count
  lazy_loading:
    - enabled
    - loaded_keys
    - scope
  row_status:
    - row_disabled_builder
    - row_readonly_builder
    - row_disabled_reason_builder
diagnostics:
  accepted_checks:
    - node_keys
    - dom_ids
    - orphans
    - cycles
  result_surface:
    attributes:
      - checks
      - errors
      - warnings
    methods:
      - success?
resource_table_render_state_call:
  required_keywords:
    - records
    - context
  optional_keywords:
    - row_partial
    - parent_id_method
    - id_method
    - table_key
    - columns
    - table_state
    - ui_config
  render_options_contract: render_state_pass_through
render_state_callback_builder_keys:
  - row_class_builder
  - row_data_builder
  - row_event_payload_builder
  - loading_builder
  - error_builder
  - depth_label_builder
  - badge_builder
  - icon_builder
  - toggle_icon_builder
javascript_package_root:
  named_exports:
    - registerTreeViewControllers
    - TreeViewControllerIdentifiers
    - TreeViewControllerEntries
    - TreeViewSelectionDataHooks
    - TreeViewEmptyStateHooks
    - TreeViewTransferDropPositions
    - TreeViewTransferDataMimeTypes
    - TreeViewRemoteStateValues
    - TreeViewStateController
    - TreeViewClientController
    - TreeViewSelectionController
    - TreeViewTransferController
    - TreeViewRemoteStateController
    - TreeViewEventNames
    - TreeViewEventDetailKeys
  transfer_drop_positions:
    before: before
    inside: inside
    after: after
  transfer_data_mime_types:
    application_json: application/json
    text_plain: text/plain
  remote_state_values:
    loading: loading
    loaded: loaded
    error: error
  controller_registrations:
    - key: state
      identifier: tree-view-state
      export: TreeViewStateController
    - key: client
      identifier: tree-view-client
      export: TreeViewClientController
    - key: selection
      identifier: tree-view-selection
      export: TreeViewSelectionController
    - key: transfer
      identifier: tree-view-transfer
      export: TreeViewTransferController
    - key: remoteState
      identifier: tree-view-remote-state
      export: TreeViewRemoteStateController
  event_names:
    state:
      state_changed: tree-view-state:state-changed
    selection:
      change: tree-view-selection:change
      selected: tree-view-selection:selected
      limit_exceeded: tree-view-selection:limit-exceeded
      invalid_payload: tree-view-selection:invalid-payload
    remote_state:
      change: tree-view-remote-state:change
      retry: tree-view-remote-state:retry
    host_lifecycle:
      loading: tree-view:loading
      loaded: tree-view:loaded
      error: tree-view:error
      retry: tree-view:retry
    transfer:
      drag_start: tree-view-transfer:drag-start
      drag_over: tree-view-transfer:drag-over
      drop: tree-view-transfer:drop
      invalid_payload: tree-view-transfer:invalid-payload
      invalid_transfer: tree-view-transfer:invalid-transfer
  event_names_without_detail:
    host_lifecycle:
      - loading
      - loaded
      - error
      - retry
  event_detail_keys:
    state:
      state_changed:
        - viewKey
        - expandedKeys
    selection:
      change:
        - selectedCount
        - selectedValues
        - selectedPayloads
      selected:
        - payloads
      limit_exceeded:
        - maxCount
        - attemptedCount
        - attemptedChecked
        - checkbox
      invalid_payload:
        - value
        - checkbox
    remote_state:
      change:
        - row
        - state
        - childrenUrl
        - nodeKey
      retry:
        - row
        - childrenUrl
        - nodeKey
    transfer:
      drag_start:
        - sourcePayload
        - sourceRow
      drag_over:
        - targetPayload
        - targetRow
        - position
      drop:
        - sourcePayload
        - targetPayload
        - position
        - targetRow
      invalid_payload:
        - value
        - row
      invalid_transfer:
        - value
  selection_data_hooks:
    hidden_input_name_value: data-tree-view-selection-hidden-input-name-value
    max_count_value: data-tree-view-selection-max-count-value
    cascade_value: data-tree-view-selection-cascade-value
    indeterminate_value: data-tree-view-selection-indeterminate-value
  empty_state_hooks:
    wrapper_attribute: data-tree-view-empty-state
    content_class: tree-view-empty-row__content
    message_class: tree-view-empty-row__message
