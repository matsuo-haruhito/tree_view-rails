module_methods:
  - configure
  - configuration
  - reset_configuration!
  - parse_selection_params
  - node_key
  - model_name_for
  - attribute_name_for
  - type_name_for
public_constants:
  - Error
  - ConfigurationError
  - InvalidTreeError
  - DuplicateNodeKeyError
  - CycleDetectedError
  - InvalidRenderWindowError
  - LocalizedNames
  - Tree
  - RenderState
  - ResourceTableRenderState
  - VisibleRows
  - RenderWindow
  - FilteredTree
  - UiConfig
  - UiConfigBuilder
  - GraphAdapter
  - NodePresenter
  - PathTree
  - PathTreeBuilder
  - ReverseTree
  - PersistedState
  - StateStore
  - Diagnostics
path_tree_builder_node_shapes:
  folder_node:
    constant: PathTreeBuilder::FolderNode
    fields:
      - key
      - parent_key
      - label
      - path
      - node_type
    predicates:
      - folder_node?
      - record_node?
  record_node:
    constant: PathTreeBuilder::RecordNode
    fields:
      - key
      - parent_key
      - label
      - path
      - record
      - node_type
    predicates:
      - folder_node?
      - record_node?
helper_methods:
  - tree_view_rows
  - tree_view_window
  - tree_node_dom_id
  - tree_children_container_dom_id
  - tree_remote_state_placeholder_dom_id
  - tree_remote_state_placeholder_attributes
  - tree_selection_value
  - tree_view_breadcrumb
  - tree_view_toolbar
  - tree_view_toolbar_supported_actions
  - tree_view_toolbar_actions
  - tree_view_toolbar_action_metadata
helper_option_keys:
  tree_view_breadcrumb:
    - label_builder
    - path_builder
    - separator
    - nav_class
    - list_class
    - item_class
    - link_class
    - current_class
    - separator_class
    - aria_label
    - html
    - list_html
    - item_html
    - link_html
    - current_html
    - separator_html
toolbar_actions:
  expand_all: expanded
  collapse_all: collapsed
  collapse_all_except_current_path: current_path
grouped_option_keys:
  initial_expansion:
    - default
    - max_depth
    - expanded_keys
    - collapsed_keys
    - current_item
    - current_key
    - auto_expand_ancestors
  render_scope:
    - max_depth
    - max_leaf_distance
  toggle_scope:
    - max_depth_from_root
    - max_leaf_distance
  selection:
    - enabled
    - visibility
    - payload_builder
    - checkbox_name
    - disabled_builder
    - disabled_reason_builder
    - selected_keys
    - cascade
    - indeterminate
    - max_count
  lazy_loading:
    - enabled
    - loaded_keys
    - scope
  row_status:
    - row_disabled_builder
    - row_readonly_builder
    - row_disabled_reason_builder
javascript_package_root:
  named_exports:
    - registerTreeViewControllers
    - TreeViewControllerIdentifiers
    - TreeViewTransferDropPositions
    - TreeViewStateController
    - TreeViewClientController
    - TreeViewSelectionController
    - TreeViewTransferController
    - TreeViewRemoteStateController
    - TreeViewEventNames
    - TreeViewEventDetailKeys
  transfer_drop_positions:
    before: before
    inside: inside
    after: after
  controller_registrations:
    - key: state
      identifier: tree-view-state
      export: TreeViewStateController
    - key: client
      identifier: tree-view-client
      export: TreeViewClientController
    - key: selection
      identifier: tree-view-selection
      export: TreeViewSelectionController
    - key: transfer
      identifier: tree-view-transfer
      export: TreeViewTransferController
    - key: remoteState
      identifier: tree-view-remote-state
      export: TreeViewRemoteStateController
  event_names:
    state:
      state_changed: tree-view-state:state-changed
    selection:
      change: tree-view-selection:change
      selected: tree-view-selection:selected
      limit_exceeded: tree-view-selection:limit-exceeded
      invalid_payload: tree-view-selection:invalid-payload
    remote_state:
      change: tree-view-remote-state:change
      retry: tree-view-remote-state:retry
    host_lifecycle:
      loading: tree-view:loading
      loaded: tree-view:loaded
      error: tree-view:error
      retry: tree-view:retry
    transfer:
      drag_start: tree-view-transfer:drag-start
      drag_over: tree-view-transfer:drag-over
      drop: tree-view-transfer:drop
      invalid_payload: tree-view-transfer:invalid-payload
      invalid_transfer: tree-view-transfer:invalid-transfer
  event_detail_keys:
    state:
      state_changed:
        - viewKey
        - expandedKeys
    selection:
      change:
        - selectedCount
        - selectedValues
        - selectedPayloads
      selected:
        - payloads
      limit_exceeded:
        - maxCount
        - attemptedCount
        - attemptedChecked
        - checkbox
      invalid_payload:
        - value
        - checkbox
    remote_state:
      change:
        - row
        - state
        - childrenUrl
        - nodeKey
      retry:
        - row
        - childrenUrl
        - nodeKey
    transfer:
      drag_start:
        - sourcePayload
        - sourceRow
      drag_over:
        - targetPayload
        - targetRow
        - position
      drop:
        - sourcePayload
        - targetPayload
        - position
        - targetRow
      invalid_payload:
        - value
        - row
      invalid_transfer:
        - value
