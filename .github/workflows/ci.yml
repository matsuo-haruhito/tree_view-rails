name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1

          if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null 2>&1; then
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          else
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
          fi

          docs_only=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              README.md|docs/*) ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec standardrb

  pr_specs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rspec

  pr_rails_matrix:
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            ruby-version: "3.2"
          - rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
            ruby-version: "3.3"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
      - if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: skipping representative Rails compatibility lane."'
      - if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v6
      - if: needs.changes.outputs.docs_only != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - if: needs.changes.outputs.docs_only != 'true'
        run: bundle exec rake

  ruby_matrix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3.2"
          - "3.3"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - run: bundle exec rake

  rails_matrix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            ruby-version: "3.2"
          - rails: "7.1"
            gemfile: gemfiles/rails_7_1.gemfile
            ruby-version: "3.2"
          - rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
            ruby-version: "3.2"
          - rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
            ruby-version: "3.3"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - run: bundle exec rake

  javascript:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: skipping JavaScript browser and entrypoint checks."'
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v6
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: npm install
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: npx playwright install --with-deps chromium
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: npm run test:js

  gem_package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: gem build tree_view.gemspec
      - run: gem install tree_view-*.gem
      - run: ruby -e "require 'tree_view'"