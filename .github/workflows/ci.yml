name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      mockups_changed: ${{ steps.detect.outputs.mockups_changed }}
      browser_smoke_changed: ${{ steps.detect.outputs.browser_smoke_changed }}
      package_sensitive: ${{ steps.detect.outputs.package_sensitive }}
      docker_setup_sensitive: ${{ steps.detect.outputs.docker_setup_sensitive }}
      docs_entrypoint_sensitive: ${{ steps.detect.outputs.docs_entrypoint_sensitive }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "mockups_changed=false" >> "$GITHUB_OUTPUT"
            echo "browser_smoke_changed=false" >> "$GITHUB_OUTPUT"
            echo "package_sensitive=true" >> "$GITHUB_OUTPUT"
            echo "docker_setup_sensitive=true" >> "$GITHUB_OUTPUT"
            echo "docs_entrypoint_sensitive=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1

          if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null 2>&1; then
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          else
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
          fi

          node script/ci_changed_files_policy.mjs <<EOF >> "$GITHUB_OUTPUT"
          $changed_files
          EOF

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec standardrb

  pr_specs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rspec

  pr_rails_matrix:
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pull requests run representative edge and current Rails lanes; Rails 7.1 stays in the main-branch full matrix.
        include:
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            ruby-version: "3.2"
          - rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
            ruby-version: "3.2"
          - rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
            ruby-version: "3.3"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
      - if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: skipping representative Rails compatibility lane."'
      - if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v6
      - if: needs.changes.outputs.docs_only != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - if: needs.changes.outputs.docs_only != 'true'
        run: bundle exec rake

  ruby_matrix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3.2"
          - "3.3"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - run: bundle exec rake

  rails_matrix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            ruby-version: "3.2"
          - rails: "7.1"
            gemfile: gemfiles/rails_7_1.gemfile
            ruby-version: "3.2"
          - rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
            ruby-version: "3.2"
          - rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
            ruby-version: "3.3"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - run: bundle exec rake

  javascript:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true' && needs.changes.outputs.mockups_changed != 'true' && needs.changes.outputs.browser_smoke_changed != 'true' && needs.changes.outputs.docs_entrypoint_sensitive != 'true'
        run: 'echo "Docs-only PR without package-facing docs, mockup, or browser-smoke changes: skipping JavaScript checks."'
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true' || needs.changes.outputs.mockups_changed == 'true' || needs.changes.outputs.browser_smoke_changed == 'true' || needs.changes.outputs.docs_entrypoint_sensitive == 'true'
        uses: actions/checkout@v6
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true' || needs.changes.outputs.mockups_changed == 'true' || needs.changes.outputs.browser_smoke_changed == 'true' || needs.changes.outputs.docs_entrypoint_sensitive == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true' || needs.changes.outputs.mockups_changed == 'true' || needs.changes.outputs.browser_smoke_changed == 'true' || needs.changes.outputs.docs_entrypoint_sensitive == 'true'
        run: npm ci
      - if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only == 'true' && needs.changes.outputs.mockups_changed != 'true' && needs.changes.outputs.browser_smoke_changed != 'true' && needs.changes.outputs.docs_entrypoint_sensitive == 'true'
        run: npm run test:docs-entrypoints
      - if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
        run: npm run test:js:core
      - if: github.event_name != 'pull_request' || needs.changes.outputs.mockups_changed == 'true' || needs.changes.outputs.browser_smoke_changed == 'true'
        run: npx playwright install --with-deps chromium
      - if: github.event_name != 'pull_request' || needs.changes.outputs.mockups_changed == 'true' || needs.changes.outputs.browser_smoke_changed == 'true'
        run: npm run test:browser

  docker_development_setup:
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker_setup_sensitive == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose build app
      - run: docker compose run --rm app sh -lc 'node --version | grep -E "^v22\." && npm --version && npm ci'

  gem_package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request' && needs.changes.outputs.package_sensitive == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: gem build tree_view.gemspec
      - run: ruby script/check_gem_package_contents.rb tree_view-*.gem
      - run: gem install tree_view-*.gem
      - run: ruby -e "require 'tree_view'"
