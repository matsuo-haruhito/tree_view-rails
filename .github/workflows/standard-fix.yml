name: Standard Ruby Auto Fix

on:
  push:
    branches:
      - style/standard-ruby-format

permissions:
  contents: write

jobs:
  standard_fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: style/standard-ruby-format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec standardrb --fix || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "Apply Standard Ruby formatting"
            git push origin HEAD:style/standard-ruby-format
          fi
